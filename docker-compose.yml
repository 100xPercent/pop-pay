version: "3.8"

services:
  pop-pay:
    build: .
    container_name: pop-pay-mcp
    restart: unless-stopped
    environment:
      # Spending policy
      POP_ALLOWED_CATEGORIES: '["aws", "cloudflare", "openai", "github"]'
      POP_MAX_PER_TX: "100.0"
      POP_MAX_DAILY: "500.0"
      POP_BLOCK_LOOPS: "true"
      # Guardrail engine: keyword (default) or llm
      # POP_GUARDRAIL_ENGINE: keyword
      # POP_LLM_API_KEY: ""
      # POP_LLM_MODEL: gpt-4o-mini
      # Stripe issuing (optional — leave unset for BYOC/mock mode)
      # POP_STRIPE_KEY: ""
      # CDP injection
      POP_CDP_URL: "http://chromium:9222"
      POP_AUTO_INJECT: "true"
    volumes:
      # Mount vault from host (encrypted at rest)
      - ${HOME}/.config/pop-pay:/home/popuser/.config/pop-pay:ro
      # State DB persistence
      - pop-state:/app/data
    stdin_open: true
    # MCP stdio transport needs stdin/stdout
    tty: false

  # Headless Chromium for CDP injection
  chromium:
    image: zenika/alpine-chrome:latest
    container_name: pop-pay-chromium
    restart: unless-stopped
    command:
      - "--no-sandbox"
      - "--disable-gpu"
      - "--disable-dev-shm-usage"
      - "--remote-debugging-address=0.0.0.0"
      - "--remote-debugging-port=9222"
    ports:
      - "9222:9222"
    # Cap memory to prevent runaway tabs
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pop-state:
