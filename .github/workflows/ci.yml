name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: npm test

  # PR-only smoke build with no secrets — validates that build.rs + lib.rs's
  # include!(...) path compiles cleanly in OSS mode (POP_VAULT_COMPILED_SALT
  # unset → build.rs emits None/None). The hardened release build still runs
  # in build-native against the production environment on main / v* tags.
  build-native-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (OSS mode, no salt)
        run: cargo check --manifest-path native/Cargo.toml

  build-native:
    runs-on: ${{ matrix.os }}
    environment: production
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci || npm install
      - name: Build native (salt injected at build time via build.rs)
        run: cd native && npm install && npm run build
        env:
          POP_VAULT_COMPILED_SALT: ${{ secrets.POP_VAULT_COMPILED_SALT }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: native/*.node
